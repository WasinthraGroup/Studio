<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าแรก | ว.Studio</title>
    <link rel="icon" href="Pics/Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/script.js" defer></script>
</head>
<body class="bg-[#fdfaf5]">
  <nav class="bg-white/80 backdrop-blur-md shadow-sm fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-20">
        <div class="text-xl font-bold" style="color: var(--thai-red);">THAI<span>WORK</span></div>
        
        <div id="navAction" class="relative">
            </div>
    </div>




<div id="profileModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
        <div class="bg-blue-50 px-6 py-4 flex justify-between items-center">
            <h3 class="text-lg font-bold">ตั้งค่าบัญชี</h3>
            <button onclick="closeProfileModal()" class="text-2xl">&times;</button>
        </div>

        <form id="profileUpdateForm" class="p-6 space-y-4">
            <div class="flex flex-col items-center gap-2">
                <img id="profilePreview" src="https://via.placeholder.com/100" class="w-20 h-20 rounded-full object-cover border-2 border-gold">
                <input type="file" id="avatarInput" accept="image/*" class="text-xs">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500">USERNAME</label>
                <input type="text" id="editUsername" class="w-full border p-2 rounded-lg" placeholder="ชื่อผู้ใช้">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500">ชื่อ-นามสกุล</label>
                <input type="text" id="editFullName" class="w-full border p-2 rounded-lg" placeholder="ชื่อจริง">
            </div>

            <hr>
            <div>
                <label class="text-xs font-bold text-gray-500">รหัสผ่านใหม่ (ถ้าจะเปลี่ยน)</label>
                <input type="password" id="newProfilePass" class="w-full border p-2 rounded-lg" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">บันทึกข้อมูล</button>
        </form>
    </div>
</div>



       
       
    </nav>

    <header class="pt-40 pb-20 px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">ยินดีต้อนรับสู่ <span style="color: var(--thai-red);">ว.Studio</span></h1>
        <p class="text-gray-600 max-w-2xl mx-auto">ศูนย์รวมข้อมูลข่าวสาร ตารางกิจกรรม และระบบจัดการงานสำหรับพนักงานในองค์กร</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="flex items-center justify-between mb-8 border-b-2 border-red-700 pb-2">
            <h2 class="text-2xl font-bold text-gray-800">ข่าวสารและประกาศล่าสุด</h2>
            <span class="text-sm text-gray-500">อัปเดต: 9 เมษายน 2569</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <article class="card-thai bg-white overflow-hidden shadow-sm hover:shadow-md transition">
                <div class="h-48 bg-gray-200 bg-[url('https://scontent.fbkk35-1.fna.fbcdn.net/v/t1.30497-1/85215299_479381239411958_7755129104415850496_n.jpg?stp=c379.0.1290.1290a_dst-jpg_s1290x1290_tt6&_nc_cat=1&ccb=1-7&_nc_sid=b6f7c7&_nc_ohc=qkb_p8lKwXIQ7kNvwHtHjfY&_nc_oc=AdoJLwOa5usmjIzPkgsnvH2t48CTb2syVdUfbIOhVyrzf1RF5z-z6TSY_JZU4yRB-se9qGL0jmytVKA7VFs8RvWN&_nc_zt=24&_nc_ht=scontent.fbkk35-1.fna&_nc_ss=7a3a8&oh=00_Af22PAxsmSn1Owh5SRdXiB8k6RQRynfC6BylH3qe2Wq7mw&oe=69DD0356')] bg-cover bg-center"></div>
                <div class="p-6">
                    <span class="text-[10px] font-bold text-red-700 uppercase tracking-widest">Title</span>
                    <h3 class="font-bold text-lg mt-2 mb-3">Test</h3>
                    <p class="text-sm text-gray-600 leading-relaxed">Desc</p>
                    <button class="mt-4 text-sm font-bold text-amber-700 hover:underline">อ่านต่อ →</button>
                </div>
            </article>


           
        </div>
    </main>

    <footer class="bg-white border-t py-10 text-center">
        <p class="text-xs text-gray-400">© 2026 ว.Studio. All rights reserved.</p>
    </footer>
</body>
</html>
