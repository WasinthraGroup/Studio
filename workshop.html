<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวิร์กชอป | ว.Studio</title>
    <link rel="icon" href="Pics/Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body class="hidden bg-[#fdfaf5]">
    
   <nav class="fixed w-full top-0 z-50 bg-white shadow-sm h-16 flex items-center px-4 justify-between">
    <div class="font-bold text-blue-600 text-xl">ว.Studio</div>

    <div id="navAction" class="flex gap-4 items-center">
        <button onclick="openProfileModal()" class="flex items-center gap-2 hover:bg-gray-100 p-1 pr-3 rounded-full transition">
            <img id="navAvatar" src="https://via.placeholder.com/40" class="w-8 h-8 rounded-full object-cover border">
            <span class="text-sm font-bold text-gray-700">โปรไฟล์</span>
        </button>

        <div class="h-6 w-[1px] bg-gray-200"></div>

        <button id="logoutBtn" class="text-red-500 text-sm font-medium hover:underline">ออกจากระบบ</button>
    </div>
</nav>

<div class="h-16"></div>

    <main class="pt-28 max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">ตารางเวลาของฉัน</h2>
                        <div class="flex gap-2 text-xs">
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> ทำงาน</span>
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-yellow-500 rounded-full"></span> ไม่ว่าง/ลา</span>
                        </div>
                    </div>
                    <div id="calendar" class="min-h-[600px]"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div id="invitePanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                    <h3 class="font-bold text-red-700 mb-4">สร้างลิงค์สมัครพนักงาน</h3>
                    <form id="createInviteForm" class="space-y-4">
                        <input 
                        type="datetime-local"
                        id="inviteExpire"
                        class="w-full border p-2 rounded text-sm"
                        required>
                        <button type="submit" class="w-full bg-red-700 text-white py-2 rounded-lg text-sm font-bold">สร้างลิงค์</button>
                    </form>
                    <div id="inviteResult" class="mt-4 text-xs"></div>
                </div>
                
                <div id="hrAssignmentPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                    <h3 class="font-bold text-red-700 mb-4">ลงงาน</h3>
                    <form id="createTaskForm" class="space-y-4">
                        <input type="text" id="taskTitle" placeholder="หัวข้อ" class="w-full border-b p-2 outline-none focus:border-red-600 text-sm" required>
                        <textarea id="taskDesc" placeholder="คำอธิบาย/คำแนะนำ" class="w-full border p-2 rounded text-sm h-20 outline-none focus:border-red-600"></textarea>
                        <input type="date" id="taskDue" class="w-full border p-2 rounded text-sm outline-none">
                        <button type="submit" class="w-full bg-red-700 text-white py-2 rounded-lg text-sm font-bold">มอบหมายงาน</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4">งานที่ได้รับมอบหมาย</h3>
                    <div id="assignmentList" class="space-y-4">
                        <p class="text-center text-gray-400 text-sm py-10 italic">กำลังโหลดรายการงาน...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
