<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวิร์กชอป | ว.Studio</title>
    <link rel="icon" href="Pics/Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body class="hidden bg-[#fdfaf5]">
    
   <nav class="bg-white/80 backdrop-blur-md shadow-sm fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-20">
        <div class="text-xl font-bold" style="color: var(--thai-red);">THAI<span>WORK</span></div>
        
        <div id="navAction" class="relative">
            </div>
    </div>




<div id="profileModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
        <div class="bg-blue-50 px-6 py-4 flex justify-between items-center">
            <h3 class="text-lg font-bold">ตั้งค่าบัญชี</h3>
            <button onclick="closeProfileModal()" class="text-2xl">&times;</button>
        </div>

        <form id="profileUpdateForm" class="p-6 space-y-4">
            <div class="flex flex-col items-center gap-2">
                <img id="profilePreview" src="https://via.placeholder.com/100" class="w-20 h-20 rounded-full object-cover border-2 border-gold">
                <input type="file" id="avatarInput" accept="image/*" class="text-xs">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500">USERNAME</label>
                <input type="text" id="editUsername" class="w-full border p-2 rounded-lg" placeholder="ชื่อผู้ใช้">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500">ชื่อ-นามสกุล</label>
                <input type="text" id="editFullName" class="w-full border p-2 rounded-lg" placeholder="ชื่อจริง">
            </div>

            <hr>
            <div>
                <label class="text-xs font-bold text-gray-500">รหัสผ่านใหม่ (ถ้าจะเปลี่ยน)</label>
                <input type="password" id="newProfilePass" class="w-full border p-2 rounded-lg" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">บันทึกข้อมูล</button>
        </form>
    </div>
</div>



       
       
    </nav>

<div class="h-16"></div>

    <main class="pt-28 max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">ตารางเวลาของฉัน</h2>
                        <div class="flex gap-2 text-xs">
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> ทำงาน</span>
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-yellow-500 rounded-full"></span> ไม่ว่าง/ลา</span>
                        </div>
                    </div>
                    <div id="calendar" class="min-h-[600px]"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div id="invitePanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                    <h3 class="font-bold text-red-700 mb-4">สร้างลิงค์สมัครพนักงาน</h3>
                    <form id="createInviteForm" class="space-y-4">
                        <input 
                        type="datetime-local"
                        id="inviteExpire"
                        class="w-full border p-2 rounded text-sm"
                        required>
                        <button type="submit" class="w-full bg-red-700 text-white py-2 rounded-lg text-sm font-bold">สร้างลิงค์</button>
                    </form>
                    <div id="inviteResult" class="mt-4 text-xs"></div>
                </div>
                
                <div id="hrAssignmentPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                    <h3 class="font-bold text-red-700 mb-4">ลงงาน</h3>
                    <form id="createTaskForm" class="space-y-4">
                        <input type="text" id="taskTitle" placeholder="หัวข้อ" class="w-full border-b p-2 outline-none focus:border-red-600 text-sm" required>
                        <textarea id="taskDesc" placeholder="คำอธิบาย/คำแนะนำ" class="w-full border p-2 rounded text-sm h-20 outline-none focus:border-red-600"></textarea>
                        <input type="date" id="taskDue" class="w-full border p-2 rounded text-sm outline-none">
                        <button type="submit" class="w-full bg-red-700 text-white py-2 rounded-lg text-sm font-bold">มอบหมายงาน</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4">งานที่ได้รับมอบหมาย</h3>
                    <div id="assignmentList" class="space-y-4">
                        <p class="text-center text-gray-400 text-sm py-10 italic">กำลังโหลดรายการงาน...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
