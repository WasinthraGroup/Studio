<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวิร์กชอป | ว.Studio</title>
    <link rel="icon" href="Pics/Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body class="hidden bg-[#fdfaf5]">
    <nav class="main-header fixed w-full top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm">
        <div id="navAction" class="flex gap-4 items-center">
    <button onclick="openProfileModal()" class="text-sm font-bold hover:text-blue-600">โปรไฟล์</button>
    <button id="logoutBtn" class="text-red-500 text-sm">ออกจากระบบ</button>
</div>

<div id="profileModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[9999] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">ตั้งค่าโปรไฟล์</h3>
            <button onclick="closeProfileModal()" class="text-gray-400 hover:text-black">&times;</button>
        </div>
                <form id="profileUpdateForm" class="space-y-4">
                    <div class="flex flex-col items-center gap-3">
                        <img id="profilePreview" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full object-cover border-4 border-gray-100">
                        <input type="file" id="avatarInput" accept="image/*" class="text-xs">
                    </div>
        
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">ชื่อ-นามสกุล</label>
                        <input type="text" id="editFullName" class="w-full border p-2 rounded-lg mt-1" required>
                    </div>
        
                    <hr class="my-4">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">เปลี่ยนรหัสผ่าน (เว้นว่างไว้หากไม่ต้องการเปลี่ยน)</p>
                    
                    <div>
                        <label class="text-xs font-bold text-gray-500">รหัสผ่านใหม่</label>
                        <input type="password" id="newProfilePass" class="w-full border p-2 rounded-lg mt-1" placeholder="••••••••">
                    </div>
        
                    <div class="flex gap-2 pt-4">
                        <button type="button" onclick="closeProfileModal()" class="flex-1 py-2 text-gray-500 font-bold">ยกเลิก</button>
                        <button type="submit" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold shadow-lg hover:bg-blue-700">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </nav>

    <main class="pt-28 max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">ตารางเวลาของฉัน</h2>
                        <div class="flex gap-2 text-xs">
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> ทำงาน</span>
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-yellow-500 rounded-full"></span> ไม่ว่าง/ลา</span>
                        </div>
                    </div>
                    <div id="calendar" class="min-h-[600px]"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div id="invitePanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                    <h3 class="font-bold text-red-700 mb-4">สร้างลิงค์สมัครพนักงาน</h3>
                    <form id="createInviteForm" class="space-y-4">
                        <input 
                        type="datetime-local"
                        id="inviteExpire"
                        class="w-full border p-2 rounded text-sm"
                        required>
                        <button type="submit" class="w-full bg-red-700 text-white py-2 rounded-lg text-sm font-bold">สร้างลิงค์</button>
                    </form>
                    <div id="inviteResult" class="mt-4 text-xs"></div>
                </div>
                
                <div id="hrAssignmentPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                    <h3 class="font-bold text-red-700 mb-4">ลงงาน</h3>
                    <form id="createTaskForm" class="space-y-4">
                        <input type="text" id="taskTitle" placeholder="หัวข้อ" class="w-full border-b p-2 outline-none focus:border-red-600 text-sm" required>
                        <textarea id="taskDesc" placeholder="คำอธิบาย/คำแนะนำ" class="w-full border p-2 rounded text-sm h-20 outline-none focus:border-red-600"></textarea>
                        <input type="date" id="taskDue" class="w-full border p-2 rounded text-sm outline-none">
                        <button type="submit" class="w-full bg-red-700 text-white py-2 rounded-lg text-sm font-bold">มอบหมายงาน</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4">งานที่ได้รับมอบหมาย</h3>
                    <div id="assignmentList" class="space-y-4">
                        <p class="text-center text-gray-400 text-sm py-10 italic">กำลังโหลดรายการงาน...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
