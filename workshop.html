<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวิร์กชอป | ว.Studio</title>
    <link rel="icon" href="Pics/Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body class="hidden bg-[#fdfaf5]">
    
     <nav class="bg-white/80 backdrop-blur-md shadow-sm fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-20">
        
        <div class="flex items-center gap-10">
            <div class="text-xl font-bold cursor-pointer" onclick="window.location.href='.'" style="color: var(--thai-red);">
                ว.<span>Studio</span>
            </div>
            
            <div id="desktopNav" class="hidden md:flex items-center gap-8">
                </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="navAction" class="relative">
                </div>
            
            <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 p-2 hover:bg-gray-100 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </div>

    <div id="mobileMenu" class="hidden md:hidden bg-white border-t border-gray-100 px-6 py-4 shadow-xl">
        <div id="mobileMenuLinks" class="flex flex-col gap-4">
            </div>
    </div>
</nav>






<div id="profileModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl shadow-black/20 animate__animated animate__zoomIn animate__faster">
        
        <div class="bg-[#721c24] px-6 py-4 flex justify-between items-center text-white">
            <h3 class="text-lg font-bold">ตั้งค่าบัญชี ว.Studio</h3>
            <button onclick="closeProfileModal()" class="text-2xl hover:text-gray-300 transition-colors">&times;</button>
        </div>

        <form id="profileUpdateForm" class="p-6 space-y-5">
            <div class="flex flex-col items-center gap-3">
                <div class="relative group">
                    <img id="profilePreview" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7csvPWMdfAHEAnhIRTdJKCK5SPK4cHfskow&s" class="w-24 h-24 rounded-full object-cover border-4 border-[#fdfaf5] shadow-md">
                    <label for="avatarInput" class="absolute bottom-0 right-0 bg-[#b38b59] text-white p-1.5 rounded-full cursor-pointer hover:scale-110 transition-transform shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </label>
                </div>
                <input type="file" id="avatarInput" accept="image/*" class="hidden">
                <p class="text-[10px] text-gray-400 font-bold uppercase">คลิกไอคอนเพื่อเปลี่ยนรูป</p>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Username</label>
                    <input type="text" id="editUsername" class="w-full border-gray-200 border p-2.5 rounded-xl mt-1 focus:ring-2 focus:ring-[#b38b59] outline-none transition-all" placeholder="ชื่อผู้ใช้">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">ชื่อ-นามสกุล</label>
                    <input type="text" id="editFullName" class="w-full border-gray-200 border p-2.5 rounded-xl mt-1 focus:ring-2 focus:ring-[#b38b59] outline-none transition-all" placeholder="ชื่อจริง">
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">รหัสผ่านใหม่</label>
                    <input type="password" id="newProfilePass" class="w-full border-gray-200 border p-2.5 rounded-xl mt-1 focus:ring-2 focus:ring-[#b38b59] outline-none transition-all" placeholder="••••••••">
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="button" onclick="closeProfileModal()" class="flex-1 py-3 text-gray-500 font-bold hover:bg-gray-50 rounded-xl transition">ยกเลิก</button>
                <button type="submit" class="flex-1 py-3 bg-[#721c24] text-white rounded-xl font-bold shadow-lg hover:opacity-90 active:scale-95 transition-all">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>
</div>





    

<div class="h-16"></div>

    <main class="pt-28 max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">ตารางเวลาของฉัน</h2>
                        <div class="flex gap-2 text-xs">
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> ทำงาน</span>
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-yellow-500 rounded-full"></span> ไม่ว่าง/ลา</span>
                        </div>
                    </div>
                    <div id="calendar" class="min-h-[600px]"></div>
                </div>
            </div>

            <div id="hrContentPanel" class="hidden mt-8 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4">เพิ่มข่าวสาร / โปรเจกต์</h3>
                <form id="addContentForm" class="space-y-4">
                    <select id="contentType" class="w-full p-3 border rounded-xl outline-none">
                        <option value="news">ข่าวสาร (News)</option>
                        <option value="projects">โปรเจกต์ (Projects)</option>
                    </select>
                    <input type="text" id="contentTitle" placeholder="หัวข้อ" class="w-full p-3 border rounded-xl outline-none" required>
                    <textarea id="contentDesc" placeholder="รายละเอียด" class="w-full p-3 border rounded-xl outline-none" rows="3" required></textarea>
                    <input type="url" id="contentImage" placeholder="ลิงก์รูปภาพ" class="w-full p-3 border rounded-xl outline-none">
                    <input type="url" id="contentLink" placeholder="ลิงก์นำทาง" class="w-full p-3 border rounded-xl outline-none">

                    <button type="submit" class="w-full bg-[#721c24] text-white py-3 rounded-xl font-bold">โพสต์ลงหน้าเว็บ</button>
                </form>
            </div>

            <div class="space-y-6">
                <div id="invitePanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                    <h3 class="font-bold text-red-700 mb-4">สร้างลิงก์เชิญ</h3>
                    <form id="createInviteForm" class="space-y-4">
                        <input 
                        type="datetime-local"
                        id="inviteExpire"
                        class="w-full border p-2 rounded text-sm"
                        required>
                        <button type="submit" class="w-full bg-red-700 text-white py-2 rounded-lg text-sm font-bold">สร้างลิงก์</button>
                    </form>
                    <div id="inviteResult" class="mt-4 text-xs"></div>
                </div>
                
                <div id="hrAssignmentPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                    <h3 class="font-bold text-red-700 mb-4">ลงงาน</h3>
                    <form id="createTaskForm" class="space-y-4">
                        <input type="text" id="taskTitle" placeholder="หัวข้อ" class="w-full border-b p-2 outline-none focus:border-red-600 text-sm" required>
                        <textarea id="taskDesc" placeholder="คำอธิบาย/คำแนะนำ" class="w-full border p-2 rounded text-sm h-20 outline-none focus:border-red-600"></textarea>
                        <input type="date" id="taskDue" class="w-full border p-2 rounded text-sm outline-none">
                        <button type="submit" class="w-full bg-red-700 text-white py-2 rounded-lg text-sm font-bold">มอบหมายงาน</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4">งานที่ได้รับมอบหมาย</h3>
                    <div id="assignmentList" class="space-y-4">
                        <p class="text-center text-gray-400 text-sm py-10 italic">กำลังโหลดรายการงาน...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

    <footer class="bg-white border-t py-12 text-center mt-20">
        <div class="text-xl font-bold mb-4" style="color: var(--thai-red);">ว.<span>Studio</span></div>
        <p class="text-xs text-gray-400">© 2026 วศินทราสตูดิโอ. All rights reserved. | <a href="policy.html">ความเป็นส่วนตัวและข้อกำหนด</a></p>
    </footer>
</html>
