<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop | ว. Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/script.js" defer></script>
</head>
<body class="hidden bg-[#fdfaf5]">
    <nav class="main-header fixed w-full top-0 z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-20">
            <div class="text-xl font-bold" style="color: var(--thai-red);">THAI<span>WORK</span></div>
            <div class="flex items-center gap-6">
                <span id="userDisplay" class="text-sm font-medium text-gray-600 bg-gray-100 px-3 py-1 rounded-full"></span>
                <button id="logoutBtn" class="text-sm text-red-700 font-semibold hover:bg-red-50 px-4 py-2 rounded-lg transition-all">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 pb-12">
        <aside id="hrMenu" class="hidden space-y-6">
            <div class="card-thai bg-white p-6 shadow-sm border border-gray-100">
                <h3 class="font-bold mb-6 text-lg border-b pb-2" style="color: var(--thai-red);">จัดการพนักงาน</h3>
                <form id="addStaffForm" class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-400">ชื่อ-นามสกุล</label>
                        <input type="text" id="newStaffName" class="w-full border-b border-gray-200 p-2 focus:border-amber-600 outline-none transition" required>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-400">Username</label>
                        <input type="text" id="newStaffUser" class="w-full border-b border-gray-200 p-2 focus:border-amber-600 outline-none transition" placeholder="ภาษาอังกฤษเท่านั้น" required>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-400">รหัสผ่านเริ่มต้น</label>
                        <input type="password" id="newStaffPass" class="w-full border-b border-gray-200 p-2 focus:border-amber-600 outline-none transition" required>
                    </div>
                    <button type="submit" class="w-full btn-thai text-sm mt-4 py-3">เพิ่มพนักงานใหม่</button>
                </form>
            </div>
        </aside>

        <section id="mainContent" class="md:col-span-3 space-y-6 transition-all duration-500">
            <div class="card-thai bg-white p-6 shadow-sm min-h-[400px]">
                <h2 class="text-2xl font-bold mb-8 border-l-4 border-red-700 pl-4" style="color: var(--thai-red);">ตารางงานและกิจกรรม</h2>
                <div id="taskList" class="space-y-4">
                    <p class="text-gray-400 italic">กำลังโหลดรายการ...</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
