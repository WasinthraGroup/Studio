<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ว.Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/script.js" defer></script>
</head>
<body class="bg-[#fdfaf5] flex items-center justify-center min-h-screen">
    <div class="card-thai bg-white p-10 shadow-lg max-w-md w-full mx-4">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold" style="color: var(--thai-red);">THAI<span>WORK</span></h1>
            <p class="text-gray-500 mt-2">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" class="w-full border-b border-gray-300 py-3 focus:border-amber-600 outline-none transition bg-transparent" placeholder="กรอก Username" required>
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">รหัสผ่าน</label>
                <input type="password" id="password" class="w-full border-b border-gray-300 py-3 focus:border-amber-600 outline-none transition bg-transparent" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full btn-thai py-4 rounded-lg shadow-md transition-all">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>
</body>
</html>
