<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | ว. Workshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script src="js/script.js" defer></script>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md card-thai reveal active">
        <h2 class="text-2xl font-bold text-center mb-6" style="color: var(--thai-red);">เข้าสู่ระบบ</h2>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน (เช่น nkhongsa)" 
                   class="w-full border p-3 rounded-lg focus:outline-none focus:ring-1 focus:ring-amber-500" required>
            <input type="password" id="password" placeholder="รหัสผ่าน" 
                   class="w-full border p-3 rounded-lg focus:outline-none focus:ring-1 focus:ring-amber-500" required>
            <button type="submit" class="w-full btn-thai">ยืนยันตัวตน</button>
        </form>
    </div>
</body>
